version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # eslint 10 breaks the Next.js lint stack: eslint-config-next pulls in
      # eslint-plugin-react, whose latest release still calls the
      # context.getFilename() API removed in eslint 10 (npm run lint crashes).
      # Re-enable once eslint-plugin-react ships eslint-10 support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      next-react:
        patterns:
          - "next"
          - "next-*"
          - "react"
          - "react-*"
          - "@types/react*"
      ai-sdk:
        patterns:
          - "ai"
          - "@openrouter/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
      dev-tooling:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
